<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scyye Music</title>

    <style>

        body{
            margin:0;
            font-family:system-ui;
            background:#0f0f0f;
            color:white;
            text-align:center;
        }

        h1{
            margin-top:40px;
            font-weight:300;
            letter-spacing:3px;
        }

        /* grid */

        #music-container{
            display:grid;
            grid-template-columns:repeat(auto-fill,200px);
            gap:40px;
            justify-content:center;
            padding:60px;
        }

        /* vinyl record */

        .record{
            width:180px;
            height:180px;
            border-radius:50%;
            background:
                    radial-gradient(circle at center,#222 45px,#111 45px, #111 55px, #222 55px, #222 65px, #111 65px, #111 75px, #222 75px);
            box-shadow:
                    inset 0 0 8px rgba(255,255,255,.05),
                    0 10px 20px rgba(0,0,0,.6);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:.25s;
            position:relative;
        }

        .record:hover{
            transform:scale(1.05);
        }

        /* center label */

        .label{
            width:75px;
            height:75px;
            border-radius:50%;
            background:#d4af37;
            color:black;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            font-size:11px;
            padding:8px;
            font-weight:bold;
        }

        /* spinning animation */

        .spinning{
            animation:spin 3s linear infinite;
        }

        @keyframes spin{
            from{transform:rotate(0deg);}
            to{transform:rotate(360deg);}
        }

        .loader{
            margin-top:80px;
            opacity:.6;
        }

    </style>
</head>

<body>

<h1>My Music</h1>

<div id="music-container">
    <div class="loader">Loading music...</div>
</div>

<audio id="player"></audio>

<script>

    /* repo info */

    const username = "Scyye";
    const repo = "scyye.github.io";
    const folder = "Assets/Music";

    const api = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

    const player = document.getElementById("player");

    let currentRecord = null;

    /* make filenames pretty */

    function formatName(name){

        return name
            .replace(".mp3","")
            .replace(/[_-]/g," ")
            .replace(/\b\w/g,l => l.toUpperCase());

    }

    async function loadMusic(){

        const container = document.getElementById("music-container");

        try{

            const response = await fetch(api);
            const files = await response.json();

            container.innerHTML = "";

            files
                .filter(file => file.name.endsWith(".mp3"))
                .forEach(file => {

                    const songName = formatName(file.name);

                    const record = document.createElement("div");
                    record.className = "record";

                    const label = document.createElement("div");
                    label.className = "label";
                    label.textContent = songName;

                    record.appendChild(label);

                    record.onclick = () => {

                        if(player.src === file.download_url && !player.paused){

                            player.pause();
                            record.classList.remove("spinning");
                            currentRecord = null;
                            return;

                        }

                        if(currentRecord)
                            currentRecord.classList.remove("spinning");

                        player.src = file.download_url;
                        player.play();

                        record.classList.add("spinning");
                        currentRecord = record;

                    };

                    container.appendChild(record);

                });

            if(container.innerHTML === "")
                container.innerHTML = "<p>No songs found.</p>";

        }
        catch(err){

            container.innerHTML = "<p>Failed to load music.</p>";
            console.error(err);

        }

    }

    loadMusic();

</script>

</body>
</html>
