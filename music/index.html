<!DOCTYPE html>
<html lang="en_US">
<head>
    <meta charset="UTF-8">
    <title>My Music</title>

    <style>

        body{
            margin:0;
            font-family:system-ui;
            background:#0f0f0f;
            color:white;
            text-align:center;
        }

        h1{
            margin-top:40px;
            font-weight:300;
            letter-spacing:2px;
        }

        #music-container{
            display:grid;
            grid-template-columns:repeat(auto-fill,260px);
            gap:25px;
            justify-content:center;
            padding:40px;
        }

        .music-card{
            background:#1b1b1b;
            border-radius:14px;
            padding:18px;
            transition:all .25s;
            box-shadow:0 10px 20px rgba(0,0,0,.4);
        }

        .music-card:hover{
            transform:translateY(-6px);
            box-shadow:0 20px 35px rgba(0,0,0,.6);
        }

        .song-title{
            font-size:15px;
            margin-bottom:10px;
            opacity:.9;
        }

        audio{
            width:100%;
            margin-top:5px;
        }

        .loader{
            margin-top:80px;
            opacity:.7;
        }

    </style>
</head>

<body>

<h1>My Music</h1>

<div id="music-container">
    <div class="loader">Loading music...</div>
</div>

<script>

    const username = "Scyye";
    const repo = "scyye.github.io";
    const folder = "Assets/Music";

    const api = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;

    async function loadMusic(){

        const container = document.getElementById("music-container");

        try{

            const response = await fetch(api);
            const files = await response.json();

            container.innerHTML = "";

            files
                .filter(file => file.name.endsWith(".mp3"))
                .forEach(file => {

                    const card = document.createElement("div");
                    card.className = "music-card";

                    const title = document.createElement("div");
                    title.className = "song-title";
                    title.textContent = file.name.replace(".mp3","");

                    const player = document.createElement("audio");
                    player.controls = true;
                    player.src = file.download_url;

                    card.appendChild(title);
                    card.appendChild(player);

                    container.appendChild(card);

                });

            if(container.innerHTML === "")
                container.innerHTML = "<p>No songs found.</p>";

        }
        catch(e){

            container.innerHTML = "<p>Failed to load music.</p>";
            console.error(e);

        }

    }

    loadMusic();

</script>

</body>
</html>
