<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moved</title>

    <!-- SEO / hint for browsers -->
    <meta http-equiv="refresh" content="3; url=https://portfolio.scyye.dev">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            background: #1e293b;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        a {
            color: #38bdf8;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        // Optional: JS redirect (backup + smoother control)
        setTimeout(() => {
            window.location.href = "https://portfolio.scyye.dev";
        }, 3000);
    </script>
</head>
<body>
<div class="box">
    <h1>Page Moved</h1>
    <p>This page has moved to:</p>
    <p><a href="https://portfolio.scyye.dev">portfolio.scyye.dev</a></p>
    <p>You will be redirected in a few seconds...</p>
</div>
</body>
</html>
